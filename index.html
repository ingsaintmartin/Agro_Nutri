<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#1a3a2a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="AgroNutri" />
  <meta name="description" content="Aplicación agronómica para análisis de nutrientes en suelos y recomendaciones de fertilización en kg/ha." />
  <title>AgroNutri – Consultoría Nutricional de Suelos</title>

  <!-- PWA Icons -->
  <link rel="apple-touch-icon" href="icons/icon-192.png" />
  <link rel="manifest" href="manifest.json" />

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ── SPLASH / LOADING ── -->
  <div id="splash">
    <div class="splash-logo">
      <svg width="64" height="64" viewBox="0 0 64 64" fill="none">
        <circle cx="32" cy="32" r="32" fill="#2d6a4f"/>
        <path d="M32 14 C32 14 20 24 20 34 C20 40.627 25.373 46 32 46 C38.627 46 44 40.627 44 34 C44 24 32 14 32 14Z" fill="#52b788"/>
        <path d="M32 20 L32 42" stroke="#b7e4c7" stroke-width="2" stroke-linecap="round"/>
        <path d="M32 30 C32 30 26 26 24 20" stroke="#b7e4c7" stroke-width="1.5" stroke-linecap="round"/>
        <path d="M32 34 C32 34 38 30 40 24" stroke="#b7e4c7" stroke-width="1.5" stroke-linecap="round"/>
      </svg>
      <h1>AgroNutri</h1>
      <p>Consultoría Nutricional de Suelos</p>
    </div>
    <div class="splash-spinner"></div>
  </div>

  <!-- ── APP SHELL ── -->
  <div id="app" class="hidden">

    <!-- TOP BAR -->
    <header id="topbar">
      <button id="btn-back" class="btn-icon hidden" aria-label="Volver">
        <svg width="24" height="24" viewBox="0 0 24 24" fill="none"><path d="M15 18L9 12L15 6" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
      <div id="topbar-title">
        <svg class="topbar-logo" width="26" height="26" viewBox="0 0 64 64" fill="none">
          <circle cx="32" cy="32" r="32" fill="#2d6a4f"/>
          <path d="M32 14 C32 14 20 24 20 34 C20 40.627 25.373 46 32 46 C38.627 46 44 40.627 44 34 C44 24 32 14 32 14Z" fill="#52b788"/>
          <path d="M32 20 L32 42" stroke="#b7e4c7" stroke-width="2" stroke-linecap="round"/>
        </svg>
        <div>
          <span class="topbar-name">AgroNutri</span>
          <span class="topbar-sub">Consultoría Nutricional</span>
        </div>
      </div>
      <button id="btn-save" class="btn-icon hidden" aria-label="Guardar análisis">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M19 21H5a2 2 0 01-2-2V5a2 2 0 012-2h11l5 5v11a2 2 0 01-2 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="17 21 17 13 7 13 7 21" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="7 3 7 8 15 8" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
      </button>
    </header>

    <!-- SCREEN CONTAINER -->
    <main id="screen-container">
      <!-- Screens injected by JS -->
    </main>

    <!-- BOTTOM NAV -->
    <nav id="bottom-nav">
      <button class="nav-btn active" data-screen="home">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/><polyline points="9 22 9 12 15 12 15 22" stroke="currentColor" stroke-width="2"/></svg>
        <span>Inicio</span>
      </button>
      <button class="nav-btn" data-screen="calculator">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><rect x="4" y="2" width="16" height="20" rx="2" stroke="currentColor" stroke-width="2"/><line x1="8" y1="6" x2="16" y2="6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="10" x2="16" y2="10" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="8" y1="14" x2="12" y2="14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Calcular</span>
      </button>
      <button class="nav-btn" data-screen="crops">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><path d="M12 2C12 2 6 8 6 13a6 6 0 0012 0C18 8 12 2 12 2z" stroke="currentColor" stroke-width="2" stroke-linecap="round"/><line x1="12" y1="8" x2="12" y2="22" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Cultivos</span>
      </button>
      <button class="nav-btn" data-screen="fertilizers">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><path d="M9 12h6M12 9v6" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
        <span>Fertil.</span>
      </button>
      <button class="nav-btn" data-screen="history">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="9" stroke="currentColor" stroke-width="2"/><polyline points="12 6 12 12 16 14" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>
        <span>Historial</span>
      </button>
    </nav>

  </div>

  <!-- TOAST -->
  <div id="toast" class="toast hidden"></div>

  <script src="data.js"></script>
  <script src="app.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('sw.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
